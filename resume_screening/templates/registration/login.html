<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Resume Screening Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }
        @keyframes float-blob-1 {
            0%, 100% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -40px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }
        @keyframes float-blob-2 {
            0%, 100% { transform: translate(0px, 0px) scale(1); }
            50% { transform: translate(-30px, 30px) scale(1.1); }
        }
        .animate-blob-1 {
            animation: float-blob-1 25s infinite ease-in-out;
        }
        .animate-blob-2 {
            animation: float-blob-2 20s infinite ease-in-out;
        }
        
        .gradient-border-card {
            position: relative;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.45);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .dark .gradient-border-card {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .gradient-border-card::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.15), rgba(99, 102, 241, 0.15));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            transition: all 0.3s ease;
        }
        .dark .gradient-border-card::before {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.22), rgba(99, 102, 241, 0.22));
        }
        .gradient-border-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 30px -10px rgba(0, 0, 0, 0.05);
        }
        .dark .gradient-border-card:hover {
            box-shadow: 0 16px 30px -10px rgba(0, 0, 0, 0.35);
        }
        .gradient-border-card:hover::before {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.65), rgba(99, 102, 241, 0.65));
        }
    </style>
</head>
<body class="bg-slate-50/50 dark:bg-slate-950 min-h-screen flex items-center justify-center p-4 relative overflow-hidden transition-colors duration-300">
    
    <!-- Theme Toggle floating button -->
    <div class="absolute top-6 right-6 z-20">
        <button id="themeToggle" class="p-3 bg-white/70 dark:bg-slate-900/70 border border-slate-200/50 dark:border-slate-800/80 backdrop-blur-md rounded-2xl text-slate-655 dark:text-slate-350 hover:text-slate-955 dark:hover:text-slate-100 hover:shadow-md transition-all duration-200 cursor-pointer">
            <!-- Sun Icon (visible in dark mode) -->
            <svg id="themeSun" class="w-5 h-5 hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M14 12a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
            <!-- Moon Icon (visible in light mode) -->
            <svg id="themeMoon" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
        </button>
    </div>

    <!-- Decorative background elements -->
    <div class="absolute w-[500px] h-[500px] rounded-full bg-blue-400/10 dark:bg-blue-500/5 blur-[90px] -top-40 -left-40 pointer-events-none animate-blob-1"></div>
    <div class="absolute w-[400px] h-[400px] rounded-full bg-indigo-400/10 dark:bg-indigo-500/5 blur-[90px] -bottom-20 -right-20 pointer-events-none animate-blob-2"></div>

    <div class="w-full max-w-md gradient-border-card p-8 rounded-3xl z-10 shadow-xl">
        
        <!-- Logo and Heading -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center p-3.5 bg-blue-50 dark:bg-blue-950/40 text-blue-700 dark:text-blue-400 rounded-2xl mb-4 shadow-sm border border-blue-100/50 dark:border-blue-900/30">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-brain"><path d="M12 18V5"/><path d="M15 13a4.17 4.17 0 0 1-3-4 4.17 4.17 0 0 1-3 4"/><path d="M17.598 6.5A3 3 0 1 0 12 5a3 3 0 1 0-5.598 1.5"/><path d="M17.997 5.125a4 4 0 0 1 2.526 5.77"/><path d="M18 18a4 4 0 0 0 2-7.464"/><path d="M19.967 17.483A4 4 0 1 1 12 18a4 4 0 1 1-7.967-.517"/><path d="M6 18a4 4 0 0 1-2-7.464"/><path d="M6.003 5.125a4 4 0 0 0-2.526 5.77"/></svg>
            </div>
            <h1 class="text-2xl font-bold text-slate-850 dark:text-slate-100 tracking-tight">Recruiter Login</h1>
            <p class="text-sm text-slate-500 dark:text-slate-400 mt-1.5">AI Resume Screening & Assessment Tool</p>
        </div>

        <!-- Error messages -->
        {% if form.errors %}
        <div class="mb-6 p-4 bg-rose-50 dark:bg-rose-950/20 border border-rose-200/40 dark:border-rose-900/30 rounded-2xl text-rose-850 dark:text-rose-400 text-sm">
            <div class="flex items-center gap-2 font-semibold mb-1">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-alert-circle"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                Authentication Failed
            </div>
            <p class="text-xs text-rose-600 dark:text-rose-400/90 leading-relaxed mt-1">Please enter a correct username and password. Note that both fields may be case-sensitive.</p>
        </div>
        {% endif %}

        <!-- Form -->
        <form method="post" action="{% url 'login' %}" class="space-y-5">
            {% csrf_token %}
            
            <div>
                <label for="id_username" class="block text-sm font-semibold text-slate-700 dark:text-slate-350 mb-1.5">Username</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400 dark:text-slate-500">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-user"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </span>
                    <input type="text" name="username" id="id_username" required autofocus placeholder="Enter username"
                        class="block w-full pl-10 pr-4 py-2.5 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl text-slate-800 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500 focus:outline-none focus:border-blue-500 dark:focus:border-blue-500 focus:bg-white dark:focus:bg-slate-900 focus:ring-4 focus:ring-blue-500/10 dark:focus:ring-blue-500/5 transition-all text-sm">
                </div>
            </div>

            <div>
                <label for="id_password" class="block text-sm font-semibold text-slate-700 dark:text-slate-350 mb-1.5">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400 dark:text-slate-500">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-lock"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    </span>
                    <input type="password" name="password" id="id_password" required placeholder="••••••••"
                        class="block w-full pl-10 pr-4 py-2.5 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl text-slate-800 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500 focus:outline-none focus:border-blue-500 dark:focus:border-blue-500 focus:bg-white dark:focus:bg-slate-900 focus:ring-4 focus:ring-blue-500/10 dark:focus:ring-blue-500/5 transition-all text-sm">
                </div>
            </div>

            <button type="submit" 
                class="w-full py-2.5 px-4 bg-gradient-to-r from-blue-600 to-indigo-600 dark:from-blue-500 dark:to-indigo-500 hover:from-blue-700 hover:to-indigo-700 dark:hover:from-blue-600 dark:hover:to-indigo-600 text-white font-semibold rounded-xl shadow-lg hover:shadow-xl hover:shadow-blue-500/10 focus:outline-none focus:ring-4 focus:ring-blue-500/20 active:scale-[0.98] transition-all duration-200 text-sm cursor-pointer border-0">
                Sign In
            </button>
        </form>

        <div class="mt-8 text-center text-xs text-slate-400 dark:text-slate-500">
            For access, please use your system administrator or superuser account.
        </div>
    </div>

    <script>
        // Init theme
        const themeSun = document.getElementById('themeSun');
        const themeMoon = document.getElementById('themeMoon');
        const currentTheme = localStorage.getItem('theme');
        
        function applyTheme(theme) {
            if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                themeSun.classList.remove('hidden');
                themeMoon.classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                themeSun.classList.add('hidden');
                themeMoon.classList.remove('hidden');
            }
        }
        
        applyTheme(currentTheme);

        document.getElementById('themeToggle').addEventListener('click', () => {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                themeSun.classList.add('hidden');
                themeMoon.classList.remove('hidden');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                themeSun.classList.remove('hidden');
                themeMoon.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
