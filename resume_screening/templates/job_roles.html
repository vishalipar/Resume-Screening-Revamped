{% extends 'screening.html' %}

{% block content %}
<div class="max-w-7xl mx-auto px-4">
    
    <!-- Header -->
    <div class="flex justify-between items-center mb-8 border-b border-slate-200/50 dark:border-slate-800/50 pb-6">
        <div>
            <h1 class="text-3xl font-bold text-slate-800 dark:text-slate-100 tracking-tight">Job Roles</h1>
            <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">Manage and configure your recruitment job roles</p>
        </div>
        <button onclick='openModal()' class="px-5 py-2.5 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white rounded-xl font-medium shadow-md hover:shadow-lg hover:shadow-blue-500/10 transition-all flex items-center gap-2 border-0 cursor-pointer text-sm">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
            </svg>
            Create New Job
        </button>
    </div>
    
    <!-- Create New job options modal -->
    <div id="create-job-options" class="hidden fixed inset-0 backdrop-blur-sm bg-slate-950/60 flex items-center justify-center z-50 p-4">
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-8 rounded-2xl w-full max-w-md shadow-2xl relative text-slate-850 dark:text-slate-150">
            <button onclick="closeModal()" class="absolute top-4 right-4 w-8 h-8 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-rose-50 dark:hover:bg-rose-950 hover:text-rose-600 dark:hover:text-rose-400 flex items-center justify-center text-slate-500 dark:text-slate-400 transition-all font-semibold border-0 cursor-pointer">✕</button>
            <div class="flex flex-col gap-6">
                <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100">Create New Job Role</h3>
                <div class="flex flex-col sm:flex-row justify-between gap-3">
                    <button id="create-job-btn-page" class="flex-1 py-3 px-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white rounded-xl font-medium shadow hover:shadow-md transition-all border-0 cursor-pointer text-sm">
                        Create Using AI
                    </button>
                    <button onclick="openManualFormPopup()" class="flex-1 py-3 px-4 bg-white dark:bg-slate-900 border border-blue-600 dark:border-blue-500 text-blue-600 dark:text-blue-450 hover:bg-blue-50 dark:hover:bg-blue-950/30 rounded-xl font-medium transition-all cursor-pointer text-sm">
                        Create Manually
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Manual Job Creation Popup Modal -->
    <div id="manual-job-modal" class="hidden fixed inset-0 backdrop-blur-sm bg-slate-950/60 z-50 flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto shadow-2xl flex flex-col">
            <div class="sticky top-0 bg-white dark:bg-slate-900 border-b border-slate-200/60 dark:border-slate-800/60 px-8 py-5 flex justify-between items-center z-10">
                <h2 class="text-xl font-bold text-slate-800 dark:text-slate-100">Create New Job Role</h2>
                <button onclick="closeManualFormPopup()" class="w-8 h-8 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-rose-50 dark:hover:bg-rose-950 hover:text-rose-600 dark:hover:text-rose-400 flex items-center justify-center text-slate-500 dark:text-slate-400 transition-all font-semibold border-0 cursor-pointer">
                    ✕
                </button>
            </div>
            
            <form id="manual-job-form" class="p-8 space-y-5 overflow-y-auto">
                {% csrf_token %}
                <!-- Job Title -->
                <div>
                    <label class="block text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-1.5">
                        Job Title <span class="text-rose-500">*</span>
                    </label>
                    <input type="text" name="title" id="manual-title" required
                        placeholder="e.g., Senior Python Developer"
                        class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl text-slate-850 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:bg-white dark:focus:bg-slate-900 focus:ring-4 focus:ring-blue-500/5 transition-all text-sm">
                </div>
                <!-- Job Description -->
                <div>
                    <label class="block text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-1.5">
                        Job Description <span class="text-rose-500">*</span>
                    </label>
                    <textarea name="description" id="manual-description" rows="4" required
                        placeholder="Describe the role, responsibilities, and what the candidate will do..."
                        class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl text-slate-850 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:bg-white dark:focus:bg-slate-900 focus:ring-4 focus:ring-blue-500/5 transition-all text-sm resize-none"></textarea>
                    <p class="text-[10px] text-slate-400 dark:text-slate-500 mt-1">Minimum 50 characters</p>
                </div>
                <!-- Required Skills -->
                <div>
                    <label class="block text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-1.5">
                        Required Skills <span class="text-rose-500">*</span>
                    </label>
                    <input type="text" name="skills" id="manual-skills" required
                        placeholder="e.g., Python, Django, PostgreSQL, AWS, Docker"
                        class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl text-slate-855 dark:text-slate-105 placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:bg-white dark:focus:bg-slate-900 focus:ring-4 focus:ring-blue-500/5 transition-all text-sm">
                    <p class="text-[10px] text-slate-400 dark:text-slate-500 mt-1">Comma-separated skills</p>
                </div>
                <!-- Experience and Location Row -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-1.5">
                            Experience Required (years) <span class="text-rose-500">*</span>
                        </label>
                        <input type="number" name="experience" id="manual-experience" min="0" max="30" required
                            placeholder="e.g., 3"
                            class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl text-slate-850 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:bg-white dark:focus:bg-slate-900 focus:ring-4 focus:ring-blue-500/5 transition-all text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-1.5">
                            Location
                        </label>
                        <input type="text" name="location" id="manual-location"
                            placeholder="e.g., Remote, New York, Bangalore"
                            class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl text-slate-850 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:bg-white dark:focus:bg-slate-900 focus:ring-4 focus:ring-blue-500/5 transition-all text-sm">
                    </div>
                </div>
                <!-- Salary Range and Education -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-1.5">
                            Salary Range
                        </label>
                        <input type="text" name="salary_range" id="manual-salary"
                            placeholder="e.g., $80k - $120k"
                            class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl text-slate-850 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:bg-white dark:focus:bg-slate-900 focus:ring-4 focus:ring-blue-500/5 transition-all text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-1.5">
                            Education Level
                        </label>
                        <select name="education_level" id="manual-education"
                            class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl text-slate-700 dark:text-slate-300 focus:outline-none focus:border-blue-500 focus:bg-white dark:focus:bg-slate-900 focus:ring-4 focus:ring-blue-500/5 transition-all text-sm">
                            <option value="" class="dark:bg-slate-900">Not Specified</option>
                            <option value="High School" class="dark:bg-slate-900">High School</option>
                            <option value="Bachelor's Degree" class="dark:bg-slate-900">Bachelor's Degree</option>
                            <option value="Master's Degree" class="dark:bg-slate-900">Master's Degree</option>
                            <option value="PhD" class="dark:bg-slate-900">PhD</option>
                        </select>
                    </div>
                </div>
                <!-- Status -->
                <div>
                    <label class="block text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-2">
                        Status <span class="text-rose-500">*</span>
                    </label>
                    <div class="flex gap-4">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="status" value="active" checked
                                class="w-4 h-4 text-blue-600 border-slate-350 dark:border-slate-700 rounded-full focus:ring-blue-500 bg-transparent">
                            <span class="text-sm text-slate-700 dark:text-slate-300 font-medium">Active</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="status" value="closed"
                                class="w-4 h-4 text-blue-600 border-slate-350 dark:border-slate-700 rounded-full focus:ring-blue-500 bg-transparent">
                            <span class="text-sm text-slate-700 dark:text-slate-300 font-medium">Closed</span>
                        </label>
                    </div>
                </div>
                <!-- Form Actions -->
                <div class="flex gap-3 pt-4 border-t border-slate-200/60 dark:border-slate-800/60">
                    <button type="submit" 
                        class="flex-1 px-6 py-3 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white rounded-xl font-bold hover:shadow-lg transition-all border-0 cursor-pointer shadow-md text-sm">
                        Create Job Role
                    </button>
                    <button type="button" onclick="closeManualFormPopup()" 
                        class="px-6 py-3 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 rounded-xl font-semibold transition-all border-0 cursor-pointer text-sm">
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Job Cards Container -->
    <div id="jobs-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- Jobs will be loaded here -->
    </div>

    <!-- Empty State -->
    <div id="empty-state" class="hidden text-center py-16">
        <svg class="w-16 h-16 mx-auto text-slate-300 dark:text-slate-750 mb-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M20.25 14.15v4.25c0 .414-.336.75-.75.75H4.5a.75.75 0 01-.75-.75V14.15m16.5 0c.414 0 .75-.336.75-.75V9.75c0-.414-.336-.75-.75-.75H4.5a.75.75 0 00-.75.75v3.65m16.5 0a2.25 2.25 0 01-2.25 2.25H5.25A2.25 2.25 0 013 14.15m14.25-10.9h-10.5A2.25 2.25 0 004.5 5.5v3.5h15V5.5a2.25 2.25 0 00-2.25-2.25z"/>
        </svg>
        <h3 class="text-xl font-semibold text-slate-700 dark:text-slate-300 mb-2">No Job Roles Yet</h3>
        <p class="text-slate-500 dark:text-slate-400 mb-4 text-sm">Create your first job role to get started</p>
        <button onclick="openModal()" class="px-6 py-2.5 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white rounded-xl hover:shadow-lg transition-all border-0 font-medium text-sm cursor-pointer shadow-md">
            Create Job Role
        </button>
    </div>

</div>

<script>
    // Load all jobs
    async function loadJobs() {
        try {
            const response = await fetch('/api/job-roles/');
            const data = await response.json();
            
            const container = document.getElementById('jobs-container');
            const emptyState = document.getElementById('empty-state');
            
            if (data.jobs.length === 0) {
                container.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }
            
            emptyState.classList.add('hidden');
            container.innerHTML = '';
            
            data.jobs.forEach(job => {
                const card = createJobCard(job);
                container.appendChild(card);
            });
            
        } catch (error) {
            console.error('Error loading jobs:', error);
        }
    }
    
    function openModal(){
        document.getElementById('create-job-options').classList.remove('hidden');
    }
    
    function closeModal(){
        document.getElementById('create-job-options').classList.add('hidden');
    }
    
    // Create job card
    function createJobCard(job) {
        const card = document.createElement('div');
        card.className = 'bg-white/70 dark:bg-slate-900/70 backdrop-blur-md border border-slate-200/80 dark:border-slate-800/80 rounded-2xl p-6 shadow-sm hover:shadow-md transition-all duration-300 hover:-translate-y-1 flex flex-col justify-between';
        
        const statusColor = job.status === 'active' ? 'emerald' : job.status === 'closed' ? 'rose' : 'amber';
        
        card.innerHTML = `
            <div class="flex flex-col justify-between h-full">
                <div>
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <div class="flex flex-wrap items-center gap-2">
                                <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100 leading-tight">${job.title}</h3>
                                <span class="px-2 py-0.5 text-[9px] font-extrabold tracking-wider rounded-md uppercase bg-${statusColor}-50 dark:bg-${statusColor}-950/40 text-${statusColor}-700 dark:text-${statusColor}-400 border border-${statusColor}-100/50 dark:border-${statusColor}-900/30">
                                    ${job.status}
                                </span>
                            </div>
                        </div>
                        <div class="flex gap-2 text-slate-400 dark:text-slate-500">
                            <button onclick="editJob(${job.id})" class="hover:text-blue-600 dark:hover:text-blue-400 hover:scale-105 active:scale-95 transition-all p-1 bg-transparent border-0 cursor-pointer" title="Edit Role">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                                </svg>
                            </button>
                            <button onclick="deleteJob(${job.id})" class="hover:text-rose-600 dark:hover:text-rose-400 hover:scale-105 active:scale-95 transition-all p-1 bg-transparent border-0 cursor-pointer" title="Delete Role">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    
                    <p class="text-xs text-slate-500 dark:text-slate-400 mb-4 line-clamp-3 leading-relaxed">${job.description}</p>
                    
                    <div class="space-y-2 mb-4 border-t border-slate-100 dark:border-slate-800/60 pt-3">
                        <div class="flex items-center gap-2 text-xs text-slate-500 dark:text-slate-450">
                            <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                            </svg>
                            <span>${job.location || 'Not specified'}</span>
                        </div>
                        
                        <div class="flex items-center gap-2 text-xs text-slate-500 dark:text-slate-450">
                            <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                            <span>${job.experience_required} years experience</span>
                        </div>
                        
                        <div class="flex items-center gap-2 text-xs text-slate-500 dark:text-slate-450">
                            <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                            </svg>
                            <span>Posted ${job.created_at}</span>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <p class="text-[11px] font-bold text-slate-400 dark:text-slate-550 uppercase tracking-wider mb-2">Required Skills:</p>
                        <div class="flex flex-wrap gap-1.5">
                            ${job.required_skills.slice(0, 4).map(skill => 
                                `<span class="px-2 py-0.5 text-[10px] rounded-md bg-blue-50/50 dark:bg-blue-950/30 text-blue-700 dark:text-blue-450 border border-blue-100/50 dark:border-blue-900/30 font-medium">${skill}</span>`
                            ).join('')}
                            ${job.required_skills.length > 4 ? `<span class="text-[10px] text-slate-400 dark:text-slate-550 font-bold ml-1">+${job.required_skills.length - 4} more</span>` : ''}
                        </div>
                    </div>
                </div>
                <div class="flex gap-2 pt-3 border-t border-slate-100 dark:border-slate-800/60 mt-2">
                    <button onclick="viewJobDetails(${job.id})" class="flex-1 px-3 py-2 text-blue-600 dark:text-blue-400 rounded-xl text-xs font-bold border border-blue-600 dark:border-blue-550 hover:bg-blue-50 dark:hover:bg-blue-950/30 transition-all cursor-pointer bg-transparent">
                        View details
                    </button>
                    <button onclick="findCandidates(${job.id}, '${job.title}')" class="flex-1 px-3 py-2 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white rounded-xl text-xs font-bold shadow hover:shadow-lg transition-all border-0 cursor-pointer">
                        Find candidates
                    </button>
                </div>
            </div>
        `;
        
        return card;
    }
    
    // Delete job
    async function deleteJob(jobId) {
        if (!confirm('Are you sure you want to delete this job role?')) return;
        
        try {
            await fetch(`/api/job-roles/${jobId}/delete/`, {
                method: 'DELETE',
                headers: {
                    "X-CSRFToken": getCookie("csrftoken")
                }
            });
            loadJobs(); // Reload
        } catch (error) {
            console.error('Error deleting job:', error);
        }
    }
    
    // View job details - Show in modal or new section
    async function viewJobDetails(jobId) {
        try {
            const response = await fetch('/api/job-roles/');
            const data = await response.json();
            
            // Find the specific job
            const job = data.jobs.find(j => j.id === jobId);
            if (!job) return;
            
            const statusColor = job.status === 'active' ? 'emerald' : 'rose';
            
            // Create modal or details section
            const detailsHTML = `
                <div class="fixed inset-0 backdrop-blur-sm bg-slate-950/60 z-50 flex items-center justify-center p-4" id="job-modal">
                    <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto p-8 relative text-slate-800 dark:text-slate-100 shadow-2xl space-y-6">
                        <button onclick="document.getElementById('job-modal').remove()" class="absolute top-4 right-4 w-8 h-8 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-rose-50 dark:hover:bg-rose-950 hover:text-rose-600 dark:hover:text-rose-400 flex items-center justify-center text-slate-500 dark:text-slate-400 transition-all font-semibold border-0 cursor-pointer">✕</button>
                        
                        <div class="flex flex-wrap items-center gap-3 pr-8">
                            <h2 class="text-2xl font-bold tracking-tight">${job.title}</h2>
                            <span class="px-2.5 py-1 text-xs font-bold rounded-lg uppercase bg-${statusColor}-50 dark:bg-${statusColor}-950/40 text-${statusColor}-700 dark:text-${statusColor}-400 border border-${statusColor}-100/50 dark:border-${statusColor}-900/30">${job.status}</span>
                        </div>
                        
                        <div class="space-y-4 text-sm leading-relaxed border-t border-slate-100 dark:border-slate-800/80 pt-4">
                            <div>
                                <h3 class="text-xs font-bold text-slate-450 dark:text-slate-500 uppercase tracking-wider mb-1.5">Description</h3>
                                <p class="text-slate-650 dark:text-slate-300 font-medium whitespace-pre-wrap">${job.description}</p>
                            </div>
                            
                            <div>
                                <h3 class="text-xs font-bold text-slate-450 dark:text-slate-500 uppercase tracking-wider mb-2">Required Skills</h3>
                                <div class="flex flex-wrap gap-2">
                                    ${job.required_skills.map(skill => 
                                        `<span class="px-3 py-1 bg-blue-50/50 dark:bg-blue-950/30 text-blue-700 dark:text-blue-400 border border-blue-100/50 dark:border-blue-900/30 rounded-lg font-semibold">${skill}</span>`
                                    ).join('')}
                                </div>
                            </div>
                            
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 border-t border-slate-100 dark:border-slate-800/50 pt-4">
                                <div>
                                    <h3 class="text-xs font-bold text-slate-450 dark:text-slate-500 uppercase tracking-wider mb-1">Experience Required</h3>
                                    <p class="text-slate-700 dark:text-slate-300 font-semibold">${job.experience_required} years</p>
                                </div>
                                <div>
                                    <h3 class="text-xs font-bold text-slate-450 dark:text-slate-500 uppercase tracking-wider mb-1">Location</h3>
                                    <p class="text-slate-700 dark:text-slate-300 font-semibold">${job.location || 'Not specified'}</p>
                                </div>
                            </div>
                            
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div>
                                    <h3 class="text-xs font-bold text-slate-450 dark:text-slate-500 uppercase tracking-wider mb-1">Salary Range</h3>
                                    <p class="text-slate-700 dark:text-slate-300 font-semibold">${job.salary_range || 'Not specified'}</p>
                                </div>
                                <div>
                                    <h3 class="text-xs font-bold text-slate-450 dark:text-slate-500 uppercase tracking-wider mb-1">Posted Date</h3>
                                    <p class="text-slate-700 dark:text-slate-300 font-semibold">${job.created_at}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            document.body.insertAdjacentHTML('beforeend', detailsHTML);
            
        } catch (error) {
            console.error('Error loading job details:', error);
        }
    }
    
    // Edit job - Show edit modal
    async function editJob(jobId) {
        try {
            const response = await fetch('/api/job-roles/');
            const data = await response.json();
            
            // Find the specific job
            const job = data.jobs.find(j => j.id === jobId);
            if (!job) return;
            
            // Create edit modal
            const editModalHTML = `
                <div class="fixed inset-0 backdrop-blur-sm bg-slate-950/60 z-50 flex items-center justify-center p-4" id="edit-modal">
                    <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto p-8 relative text-slate-800 dark:text-slate-100 shadow-2xl flex flex-col">
                        <div class="sticky top-0 bg-white dark:bg-slate-900 border-b border-slate-200/60 dark:border-slate-800/60 pb-4 flex justify-between items-center z-10">
                            <h2 class="text-xl font-bold tracking-tight">Edit Job Role</h2>
                            <button onclick="closeEditModal()" class="w-8 h-8 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-rose-50 dark:hover:bg-rose-950 hover:text-rose-600 dark:hover:text-rose-400 flex items-center justify-center text-slate-500 dark:text-slate-400 transition-all font-semibold border-0 cursor-pointer">✕</button>
                        </div>
                        
                        <form id="edit-job-form" class="space-y-4 overflow-y-auto pt-4 pr-1">
                            <input type="hidden" id="edit-job-id" value="${job.id}">
                            
                            <div>
                                <label class="block text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-1.5">Job Title</label>
                                <input type="text" id="edit-title" value="${job.title}" 
                                    class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl text-slate-800 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:bg-white dark:focus:bg-slate-900 focus:ring-4 focus:ring-blue-500/5 transition-all text-sm" required>
                            </div>
                            
                            <div>
                                <label class="block text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-1.5">Description</label>
                                <textarea id="edit-description" rows="4" 
                                    class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl text-slate-800 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:bg-white dark:focus:bg-slate-900 focus:ring-4 focus:ring-blue-500/5 transition-all text-sm resize-none" required>${job.description}</textarea>
                            </div>
                            
                            <div>
                                <label class="block text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-1.5">Required Skills (comma separated)</label>
                                <input type="text" id="edit-skills" value="${job.required_skills.join(', ')}" 
                                    class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl text-slate-855 dark:text-slate-105 placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:bg-white dark:focus:bg-slate-900 focus:ring-4 focus:ring-blue-500/5 transition-all text-sm" required>
                            </div>
                            
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-1.5">Experience (years)</label>
                                    <input type="number" id="edit-experience" value="${job.experience_required}" 
                                        class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl text-slate-800 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:bg-white dark:focus:bg-slate-900 focus:ring-4 focus:ring-blue-500/5 transition-all text-sm" required>
                                </div>
                                <div>
                                    <label class="block text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-1.5">Location</label>
                                    <input type="text" id="edit-location" value="${job.location || ''}" 
                                        class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl text-slate-800 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:bg-white dark:focus:bg-slate-900 focus:ring-4 focus:ring-blue-500/5 transition-all text-sm">
                                </div>
                            </div>
                            
                            <div>
                                <label class="block text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-1.5">Salary Range</label>
                                <input type="text" id="edit-salary" value="${job.salary_range || ''}" 
                                    placeholder="e.g., $80k - $120k"
                                    class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl text-slate-800 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:bg-white dark:focus:bg-slate-900 focus:ring-4 focus:ring-blue-500/5 transition-all text-sm">
                            </div>
                            
                            <div>
                                <label class="block text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-1.5">Status</label>
                                <select id="edit-status" 
                                    class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl text-slate-700 dark:text-slate-300 focus:outline-none focus:border-blue-500 focus:bg-white dark:focus:bg-slate-900 focus:ring-4 focus:ring-blue-500/5 transition-all text-sm">
                                    <option value="active" ${job.status === 'active' ? 'selected' : ''}>Active</option>
                                    <option value="closed" ${job.status === 'closed' ? 'selected' : ''}>Closed</option>
                                </select>
                            </div>
                            
                            <div class="flex gap-3 pt-4 border-t border-slate-100 dark:border-slate-800/60 mt-3">
                                <button type="submit" 
                                    class="flex-1 px-4 py-2.5 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white rounded-xl font-bold hover:shadow-lg hover:shadow-blue-500/10 active:scale-[0.98] transition-all border-0 text-sm cursor-pointer shadow-md">
                                    Save Changes
                                </button>
                                <button type="button" onclick="closeEditModal()" 
                                    class="px-4 py-2.5 bg-slate-100 dark:bg-slate-800 hover:bg-slate-205 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-350 rounded-xl font-semibold transition-all border-0 text-sm cursor-pointer">
                                    Cancel
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            `;
            
            document.body.insertAdjacentHTML('beforeend', editModalHTML);
            
            // Handle form submission
            document.getElementById('edit-job-form').addEventListener('submit', saveJobChanges);
            
        } catch (error) {
            console.error('Error loading job for edit:', error);
        }
    }

    // Close edit modal
    function closeEditModal() {
        const modal = document.getElementById('edit-modal');
        if (modal) modal.remove();
    }
    
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== "") {
            const cookies = document.cookie.split(";");
            for (let cookie of cookies) {
                cookie = cookie.trim();
                if (cookie.startsWith(name + "=")) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    // Save job changes
    async function saveJobChanges(e) {
        e.preventDefault();
        
        const jobId = document.getElementById('edit-job-id').value;
        const skillsInput = document.getElementById('edit-skills').value;
        
        const updatedJob = {
            title: document.getElementById('edit-title').value,
            description: document.getElementById('edit-description').value,
            required_skills: skillsInput.split(',').map(s => s.trim()).filter(s => s),
            experience_required: parseInt(document.getElementById('edit-experience').value),
            location: document.getElementById('edit-location').value,
            salary_range: document.getElementById('edit-salary').value,
            status: document.getElementById('edit-status').value
        };
        
        try {
            const response = await fetch(`/api/job-roles/${jobId}/update/`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": getCookie("csrftoken")
                },
                body: JSON.stringify(updatedJob)
            });
            
            if (response.ok) {
                closeEditModal();
                loadJobs(); // Reload the jobs list
                alert('Job updated successfully!');
            } else {
                alert('Failed to update job');
            }
            
        } catch (error) {
            console.error('Error updating job:', error);
            alert('Error updating job');
        }
    }
    
    // Find candidates for this job
    function findCandidates(jobId, jobTitle) {
        // Navigate to main page and trigger search
        window.location.href = `/?search=${encodeURIComponent(jobTitle)}`;
    }
    
    // Load jobs on page load
    loadJobs();

    // Create new job button handler
    const createJobBtnPage = document.getElementById('create-job-btn-page');
    if (createJobBtnPage) {
        createJobBtnPage.addEventListener('click', () => {
            window.location.href = '/job-roles/?action=create_job';
        });
    }
    
    // Open manual form popup
    function openManualFormPopup() {
        document.getElementById('manual-job-modal').classList.remove('hidden');
        document.getElementById('create-job-options').classList.add('hidden');
        document.body.style.overflow = 'hidden'; // Prevent background scroll
    }

    // Close manual form popup
    function closeManualFormPopup() {
        document.getElementById('manual-job-modal').classList.add('hidden');
        document.body.style.overflow = 'auto'; // Restore scroll
        document.getElementById('manual-job-form').reset();
    }

    // Handle manual form submission
    document.getElementById('manual-job-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const formData = new FormData(e.target);
        const skills = formData.get('skills').split(',').map(s => s.trim()).filter(s => s);
        
        const jobData = {
            title: formData.get('title'),
            description: formData.get('description'),
            required_skills: skills,
            experience_required: parseInt(formData.get('experience')),
            location: formData.get('location') || '',
            salary_range: formData.get('salary_range') || '',
            education_level: formData.get('education_level') || '',
            status: formData.get('status')
        };
        
        try {
            const response = await fetch('/api/jobs/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': formData.get('csrfmiddlewaretoken')
                },
                body: JSON.stringify(jobData)
            });
            
            if (response.ok) {
                const data = await response.json();
                closeManualFormPopup();
                loadJobs(); // Reload jobs list
                
                // Show success message
                alert(`✅ Job role "${data.title}" created successfully!`);
            } else {
                alert('Failed to create job role. Please try again.');
            }
        } catch (error) {
            console.error('Error:', error);
            alert('An error occurred. Please try again.');
        }
    });
    
</script>
{% endblock %}
